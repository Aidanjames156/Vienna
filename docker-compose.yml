services:
  postgres:
    image: postgres:16
    ports:
      - 5432:5432
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: jukebox
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backend/sql/schema.sql:/docker-entrypoint-initdb.d/schema.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    image: node:20-alpine
    working_dir: /app
    # -L = nodemon legacy/polling watch, required for file-change detection over
    # the Windows bind mount (native fs events don't cross the host boundary).
    command: sh -c "npm install && npm run dev -- -L"
    ports:
      - 4000:4000
    env_file:
      - ./backend/.env
    environment:
      # override only what must differ inside the container network:
      DATABASE_URL: postgresql://postgres:${POSTGRES_PASSWORD:-postgres}@postgres:5432/jukebox
      PORT: 4000
    volumes:
      - ./backend:/app
      - /app/node_modules
    depends_on:
      postgres:
        condition: service_healthy

  frontend:
    image: node:20-alpine
    working_dir: /app
    # Run dev on webpack (not Turbopack): Turbopack's Rust file watcher can't
    # detect edits over the Windows bind mount and ignores polling env vars,
    # so hot reload breaks. webpack honors WATCHPACK_POLLING below.
    command: sh -c "npm install && npm run dev -- --webpack"
    ports:
      - 3000:3000
    environment:
      # Polling is required for file-change detection over the Windows bind mount;
      # native fs events don't cross the host boundary.
      WATCHPACK_POLLING: "true"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    depends_on:
      - backend

volumes:
  postgres_data:
